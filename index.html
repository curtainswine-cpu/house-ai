<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f7f6f3" />
  <title>Home — House AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="topbar__left">
      <h1 class="brand">Home</h1>
      <p id="todayDate" class="topbar__date">—</p>
    </div>
    <div class="topbar__right">
      <span class="who-label">Viewing as</span>
      <div id="personToggle" class="person-toggle" role="group" aria-label="Who is using the app">
        <!-- person buttons injected by JS -->
      </div>
    </div>
  </header>

  <!-- ============ MAIN VIEWS ============ -->
  <main id="main">

    <!-- ---- TODAY ---- -->
    <section id="view-today" class="view" data-view="today">
      <div class="view__head">
        <h2>Today</h2>
        <p class="view__sub" id="todaySummary">—</p>
      </div>

      <div id="todayRoutines" class="card-list">
        <!-- today's routines injected here -->
      </div>

      <div class="today-spend">
        <div class="today-spend__row">
          <span>Spent today</span>
          <strong id="todaySpendTotal">£0.00</strong>
        </div>
        <button class="btn btn--ghost" data-goto="spending">+ Log a quick expense</button>
      </div>
    </section>

    <!-- ---- ROUTINES ---- -->
    <section id="view-routines" class="view" data-view="routines" hidden>
      <div class="view__head">
        <h2>Routines &amp; Chores</h2>
        <button class="btn btn--primary" id="addRoutineBtn">+ New</button>
      </div>
      <div id="routinesList" class="card-list"></div>
    </section>

    <!-- ---- SPENDING ---- -->
    <section id="view-spending" class="view" data-view="spending" hidden>
      <div class="view__head">
        <h2>Spending</h2>
        <button class="btn btn--primary" id="addExpenseBtn">+ Add</button>
      </div>

      <div class="spend-summary" id="spendSummary"></div>
      <div id="expensesList" class="card-list"></div>
    </section>

  </main>

  <!-- ============ BOTTOM NAV ============ -->
  <nav class="tabbar" aria-label="Main sections">
    <button class="tab is-active" data-goto="today">
      <span class="tab__icon">☀️</span><span class="tab__label">Today</span>
    </button>
    <button class="tab" data-goto="routines">
      <span class="tab__icon">🔁</span><span class="tab__label">Routines</span>
    </button>
    <button class="tab" data-goto="spending">
      <span class="tab__icon">💷</span><span class="tab__label">Spending</span>
    </button>
  </nav>

  <!-- ============ MODAL (shared) ============ -->
  <div id="modalRoot" class="modal-root" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__head">
        <h3 id="modalTitle">—</h3>
        <button class="icon-btn" data-close-modal aria-label="Close">✕</button>
      </div>
      <div id="modalBody" class="modal__body"></div>
    </div>
  </div>

  <!-- Scripts: plain globals so it works by just opening the file -->
  <script src="js/storage.js"></script>
  <script src="js/routines.js"></script>
  <script src="js/spending.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
