<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0e16" />
  <title>JARVIS · Home System</title>

  <!-- Installable app (home-screen icon, offline, full-screen) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/favicon.png" sizes="any" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="JARVIS" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="styles.css" />

  <!-- Google Identity Services (for the live calendar sign-in) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="topbar__left">
      <div class="brand"><span class="reactor" aria-hidden="true"></span> JARVIS</div>
      <p class="greeting" id="greeting">—</p>
      <p id="todayDate" class="topbar__date">—</p>
    </div>
    <div class="topbar__right">
      <span class="who-label">Active user</span>
      <div id="personToggle" class="person-toggle" role="group" aria-label="Who is using the app">
        <!-- person buttons injected by JS -->
      </div>
    </div>
  </header>

  <!-- ============ MAIN VIEWS ============ -->
  <main id="main">

    <!-- ---- HOME (a simple snapshot of your day) ---- -->
    <section id="view-today" class="view" data-view="today">
      <div class="view__head">
        <h2>Today</h2>
        <button class="btn btn--mini" id="restToggle">🌙 Rest day</button>
      </div>
      <p class="view__sub" id="todaySummary">—</p>

      <div id="shiftBanner"></div>
      <div id="restBanner"></div>

      <h3 class="section-label">Your tasks</h3>
      <div id="todayRoutines" class="card-list"></div>
      <div id="todayProjects"></div>
      <div id="todayHousehold"></div>

      <h3 class="section-label">Your day</h3>
      <div id="todayCalendar"></div>
    </section>

    <!-- ---- CLEANING & CHORES (shared) ---- -->
    <section id="view-cleaning" class="view" data-view="cleaning" hidden>
      <div class="view__head">
        <h2>Cleaning &amp; chores</h2>
        <button class="btn btn--primary" id="addCleaningBtn">+ New</button>
      </div>
      <p class="view__sub" style="margin:0 0 12px">Shared household jobs — you both see these.</p>
      <div id="cleaningList" class="card-list"></div>
    </section>

    <!-- ---- FOOD: fridge & freezer (shared) ---- -->
    <section id="view-food" class="view" data-view="food" hidden>
      <div class="view__head">
        <h2>Fridge &amp; Freezer</h2>
      </div>
      <div id="foodBody"></div>
    </section>

    <!-- ---- HEALTH ---- -->
    <section id="view-health" class="view" data-view="health" hidden>
      <div class="view__head">
        <h2>Health</h2>
      </div>
      <div id="todayHealth"></div>
    </section>

    <!-- ---- MORE ---- -->
    <section id="view-more" class="view" data-view="more" hidden>
      <div class="view__head"><h2>More</h2></div>
      <div class="more-links">
        <button class="more-link" data-goto="learn">📚 <span>Learn Punjabi</span> <span class="more-link__go">›</span></button>
        <button class="more-link" data-goto="money">💷 <span>Money</span> <span class="more-link__go">›</span></button>
      </div>

      <div class="subhead-row">
        <h3>Your routines</h3>
        <div class="head-actions">
          <button class="btn btn--mini" id="suggestRoutinesBtn">Suggestions</button>
          <button class="btn btn--primary" id="addRoutineBtn">+ New</button>
        </div>
      </div>
      <div id="routinesList" class="card-list"></div>

      <div class="subhead-row">
        <h3>Projects</h3>
        <button class="btn btn--mini" id="addProjectBtn">+ New</button>
      </div>
      <p class="view__sub" style="margin:0 0 12px">Big stuck tasks, broken into steps — only the next one shows on Home.</p>
      <div id="projectsList" class="card-list"></div>
    </section>

    <!-- ---- MONEY (reached from More) ---- -->
    <section id="view-money" class="view" data-view="money" hidden>
      <div class="view__head">
        <h2>Money</h2>
        <button class="btn btn--mini" data-goto="more">‹ More</button>
      </div>
      <div id="moneyView"></div>
    </section>

    <!-- ---- LEARN PUNJABI (reached from More) ---- -->
    <section id="view-learn" class="view" data-view="learn" hidden>
      <div class="view__head">
        <h2>Learn Punjabi</h2>
        <button class="btn btn--mini" data-goto="more">‹ More</button>
      </div>
      <div class="seg" id="learnTabs" role="tablist">
        <button class="seg__btn is-active" data-learn="words">Words</button>
        <button class="seg__btn" data-learn="cards">Flashcards</button>
        <button class="seg__btn" data-learn="add">Add</button>
        <button class="seg__btn" data-learn="import">Import</button>
      </div>
      <div id="learnBody" class="card-list"></div>
    </section>

  </main>

  <!-- ============ BOTTOM NAV ============ -->
  <nav class="tabbar" aria-label="Main sections">
    <button class="tab is-active" data-goto="today">
      <span class="tab__icon">🏠</span><span class="tab__label">Home</span>
    </button>
    <button class="tab" data-goto="cleaning">
      <span class="tab__icon">🧹</span><span class="tab__label">Cleaning</span>
    </button>
    <button class="tab" data-goto="food">
      <span class="tab__icon">❄️</span><span class="tab__label">Food</span>
    </button>
    <button class="tab" data-goto="health">
      <span class="tab__icon">💗</span><span class="tab__label">Health</span>
    </button>
    <button class="tab" data-goto="more">
      <span class="tab__icon">⋯</span><span class="tab__label">More</span>
    </button>
  </nav>

  <!-- ============ MODAL (shared) ============ -->
  <div id="modalRoot" class="modal-root" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__head">
        <h3 id="modalTitle">—</h3>
        <button class="icon-btn" data-close-modal aria-label="Close">✕</button>
      </div>
      <div id="modalBody" class="modal__body"></div>
    </div>
  </div>

  <!-- Scripts: plain globals so it works by just opening the file -->
  <script src="js/storage.js"></script>
  <script src="js/routines.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/trackers.js"></script>
  <script src="js/finance.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/punjabi.js"></script>
  <script src="js/food.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
